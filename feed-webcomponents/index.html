    <div class="feed-post bstn-item-shape type-basico">
      <div class="feed-post-body">
        <div class="feed-post-header with-post-chapeu">
          <span class="feed-post-header-chapeu"><slot name="chapeu"></slot></span>
        </div>
        <div class="feed-post-body-title gui-color-primary gui-color-hover ">
          <div class="_s">
            <div class="_b">
              <slot name="title" />

            </div>
          </div>
        </div>
        <div class="feed-post-body-resumo">
          <div class="_s">Um dos suspeitos precisou de atendimento médico; o outro foi preso em flagrante.</div>
        </div>
        <div class="feed-media-wrapper">
          <div class="_s">
            <a href="https://g1.globo.com/am/amazonas/noticia/2019/12/05/motorista-persegue-e-atropela-assaltantes-apos-roubo-video-mostra-suspeitos-voando-sobre-carro.ghtml" class="feed-post-figure-link gui-image-hover">
              <div class="_preempt-visibility">
                <div class="bstn-fd-item-cover ">
                  <picture class="bstn-fd-cover-picture">
                    <slot name="picture"></slot>
                  </picture>
                </div>
              </div>
            </a>
          </div>
        </div>
        <div class="feed-post-metadata">
          <span class="feed-post-datetime"><slot name="issued"></slot></span>
          <span class="feed-post-metadata-section"><slot name="section"></slot> </span>
        </div>
      </div>
    </div>
  </template>
